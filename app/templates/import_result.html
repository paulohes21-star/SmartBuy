{% extends "base.html" %}{% block content %}<p class="eyebrow">IMPORTAÇÃO EXCEL</p><h1>Resultado da importação</h1><div class="cards compact"><div class="card"><small>Linhas processadas</small><strong>{{success}}</strong></div><div class="card"><small>Erros</small><strong>{{errors|length}}</strong></div></div>{% if errors %}<div class="error"><b>Linhas não importadas:</b><ul>{% for e in errors %}<li>{{e}}</li>{% endfor %}</ul></div>{% endif %}<a class="btn" href="/products">Voltar aos produtos</a>{% endblock %}
