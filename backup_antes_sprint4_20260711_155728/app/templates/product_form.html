{% extends "base.html" %}{% block content %}<p class="eyebrow">NOVO PRODUTO</p><h1>Cadastro completo</h1>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form class="form-card" method="post"><h2>Identificação</h2><div class="grid three"><label>Código interno<input name="internal_code" required></label><label>Descrição<input name="description" required></label><label>Código ERP<input name="erp_code"></label><label>Código de barras<input name="barcode"></label><label>NCM<input name="ncm"></label><label>Status<select name="active"><option value="1">Ativo</option><option value="0">Inativo</option></select></label></div><h2>Classificação e fornecedor</h2><div class="grid three"><label>Categoria<select name="category_id"><option value="">—</option>{% for x in categories %}<option value="{{x['id']}}">{{x['name']}}</option>{% endfor %}</select></label><label>Marca<select name="brand_id"><option value="">—</option>{% for x in brands %}<option value="{{x['id']}}">{{x['name']}}</option>{% endfor %}</select></label><label>Unidade<select name="unit_id" required>{% for x in units %}<option value="{{x['id']}}">{{x['code']}} — {{x['description']}}</option>{% endfor %}</select></label><label>Fornecedor padrão<select name="default_supplier_id"><option value="">—</option>{% for x in suppliers %}<option value="{{x['id']}}">{{x['trade_name'] or x['legal_name']}}</option>{% endfor %}</select></label><label>IPI %<input name="ipi_rate" type="number" step="0.01" value="0"></label><label>ICMS %<input name="icms_rate" type="number" step="0.01" value="0"></label></div><h2>Parâmetros iniciais por empresa</h2><div class="grid three"><label>Empresa<select name="company_id"><option value="">Cadastrar depois</option>{% for x in companies %}<option value="{{x['id']}}">{{x['code']}} — {{x['trade_name'] or x['legal_name']}}</option>{% endfor %}</select></label><label>Estoque mínimo<input name="minimum_stock" type="number" step="0.001" value="0"></label><label>Estoque máximo<input name="maximum_stock" type="number" step="0.001" value="0"></label><label>Lead time (dias)<input name="lead_time_days" type="number" value="0"></label><label>Localização<input name="stock_location"></label><label>Estoque atual<input name="current_stock" type="number" step="0.001" value="0"></label><label>Custo médio<input name="average_cost" type="number" step="0.01" value="0"></label><label>Último custo<input name="last_cost" type="number" step="0.01" value="0"></label><label>Última compra<input name="last_purchase_date" type="date"></label></div><button>Cadastrar produto</button></form>{% endblock %}
